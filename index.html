<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuroraPatas - Loja Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* PALETA DE CORES: Tons de Bege Suave, Nude, Fendi e Branco Puro */
        :root {
            --bg-principal: #FDFBF7;
            --bg-card: #FFFFFF;
            --bege-escuro: #5C4A3C;
            --bege-medio: #A38F7D;
            --bege-claro: #EFEBE4;
            --bege-destaque: #D1C4B6;
            --texto-escuro: #3D322A;
            --texto-claro: #7A6E65;
        }

        body {
            background-color: var(--bg-principal);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-escuro);
            margin: 0;
            padding: 0;
        }

        .barra-aviso {
            background-color: var(--bege-escuro);
            color: #FFFFFF;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header {
            background-color: #FFFFFF;
            padding: 25px 5%;
            box-shadow: 0 2px 10px rgba(92, 74, 60, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bege-claro);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .monograma-ap {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 2px solid var(--bege-escuro);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 3px var(--bege-claro);
        }
        .monograma-ap::before {
            content: "A";
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 300;
            color: var(--bege-escuro);
            position: absolute;
            transform: translate(-6px, -4px);
        }
        .monograma-ap::after {
            content: "P";
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: bold;
            color: var(--bege-medio);
            position: absolute;
            transform: translate(6px, 4px);
            mix-blend-mode: multiply;
        }
        .texto-logo { display: flex; flex-direction: column; }
        .marca-nome { font-size: 24px; font-weight: 700; letter-spacing: 2px; color: var(--bege-escuro); text-transform: uppercase; }
        .marca-sub { font-size: 11px; color: var(--bege-medio); letter-spacing: 3px; text-transform: uppercase; }

        .layout-loja {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 30px;
        }

        .secao-produtos { display: flex; flex-direction: column; gap: 30px; }
        .card-sistema { background-color: var(--bg-card); border: 1px solid var(--bege-claro); border-radius: 8px; padding: 25px; box-shadow: 0 4px 12px rgba(92, 74, 60, 0.02); }
        .card-sistema h2 { margin-top: 0; color: var(--bege-escuro); font-size: 18px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--bege-claro); padding-bottom: 10px; }

        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--texto-escuro); }
        select { width: 100%; padding: 10px 12px; border: 1px solid var(--bege-destaque); border-radius: 4px; background-color: var(--bg-principal); color: var(--texto-escuro); box-sizing: border-box; font-size: 14px; }

        .vitrine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 15px; }
        .produto-item { background: #FFFFFF; border: 1px solid var(--bege-claro); border-radius: 6px; padding: 15px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
        .produto-item:hover { transform: translateY(-4px); box-shadow: 0 6px 15px rgba(92, 74, 60, 0.06); }

        .container-imagens-produto { width: 100%; height: 150px; background: var(--bege-claro); border-radius: 4px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .preview-img-principal { width: 100%; height: 100%; object-fit: cover; }
        .miniaturas-linha { display: flex; justify-content: center; gap: 4px; margin-bottom: 10px; }
        .miniatura-ponto { width: 25px; height: 25px; border: 1px solid var(--bege-destaque); border-radius: 3px; object-fit: cover; cursor: pointer; }

        .prod-nome { font-weight: 600; font-size: 15px; margin: 8px 0 4px; color: var(--texto-escuro); }
        .prod-preco { color: var(--bege-escuro); font-weight: 700; font-size: 16px; margin-bottom: 10px; }

        .btn-comprar { background-color: var(--bege-escuro); color: #FFFFFF; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .btn-comprar:hover { background-color: #45372C; }

        .checkout-lateral { display: flex; flex-direction: column; gap: 20px; }
        .lista-carrinho { list-style: none; padding: 0; margin: 15px 0; max-height: 180px; overflow-y: auto; }
        .item-carrinho { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px dashed var(--bege-claro); }
        .resumo-linha { display: flex; justify-content: space-between; font-weight: 700; font-size: 16px; margin-top: 15px; padding-top: 15px; border-top: 2px solid var(--bege-claro); color: var(--bege-escuro); }

        .painel-pagamento { margin-top: 15px; padding: 15px; background: var(--bg-principal); border: 1px solid var(--bege-destaque); border-radius: 6px; text-align: center; }
        #qrcode-output { display: flex; justify-content: center; margin: 15px 0; }
        
        @media (max-width: 850px) {
            .layout-loja { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="barra-aviso">
        🐾 Frete Fixo Especial para toda a linha AuroraPatas — Aproveite!
    </div>

    <header>
        <div class="logo-box">
            <div class="monograma-ap"></div>
            <div class="texto-logo">
                <span class="marca-nome">AuroraPatas</span>
                <span class="marca-sub">Boutique & Artigos</span>
            </div>
        </div>
    </header>

    <div class="layout-loja">
        <main class="secao-produtos">
            <section class="card-sistema">
                <h2>Vitrine de Produtos</h2>
                <div class="vitrine-grid" id="vitrine">
                    </div>
            </section>
        </main>

        <aside class="checkout-lateral">
            <div class="card-sistema">
                <h2>Sacola de Pedidos</h2>
                <ul class="lista-carrinho" id="itens-carrinho-lista">
                    <li style="color: var(--bege-medio); text-align: center; font-size: 13px; padding: 20px 0;">Sua sacola está vazia</li>
                </ul>
                <div class="resumo-linha">
                    <span>Total do Pedido:</span>
                    <span id="valor-total-carrinho">R$ 0,00</span>
                </div>
            </div>

            <div class="card-sistema">
                <h2>Forma de Pagamento</h2>
                <label for="metodo-pagamento">Selecione como deseja pagar:</label>
                <select id="metodo-pagamento" onchange="alternarCamposParcelamento()">
                    <option value="pix">Pix (QR Code Automático)</option>
                    <option value="especie">Espécie (Pagamento na Entrega)</option>
                    <option value="parcelado">Parcelado (Até 4x sem juros)</option>
                </select>

                <div id="wrapper-parcelas" style="display: none; margin-top: 15px;">
                    <label for="qtd-parcelas">Número de parcelas:</label>
                    <select id="qtd-parcelas">
                        <option value="1">1x sem juros</option>
                        <option value="2">2x sem juros</option>
                        <option value="3">3x sem juros</option>
                        <option value="4">4x sem juros</option>
                    </select>
                </div>

                <button type="button" class="btn-comprar" style="margin-top: 20px; background-color: #45372C;" onclick="fecharPedidoLoja()">
                    Fechar e Gerar Pagamento
                </button>

                <div id="checkout-resultado" style="display: none;" class="painel-pagamento"></div>
            </div>
        </aside>
    </div>

    <script>
        /* CONFIGURAÇÕES DO SEU NEGÓCIO ========================== */
        const MEU_WHATSAPP = "86994010521"; // Seu WhatsApp com DDD
        const MINHA_CHAVE_PIX = "12308639358"; // Sua chave Pix
        /* ======================================================= */

        let totalCompra = 0;
        let itensNoCarrinho = [];

        // Carrega automaticamente os produtos salvos no navegador ao abrir o site
        function carregarVitrine() {
            const vitrine = document.getElementById('vitrine');
            const produtosSalvos = JSON.parse(localStorage.getItem('produtos_aurorapatas')) || [];
            
            if(produtosSalvos.length === 0) {
                vitrine.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--bege-medio);">Nenhum produto disponível no momento.</p>`;
                return;
            }

            vitrine.innerHTML = "";
            produtosSalvos.forEach(prod => {
                const produtoHTML = `
                    <div class="produto-item">
                        <div class="container-imagens-produto">
                            <img src="${prod.img0}" id="main-img-${prod.id}" class="preview-img-principal" alt="${prod.nome}">
                        </div>
                        <div class="miniaturas-linha">
                            <img src="${prod.img0}" class="miniatura-ponto" onclick="document.getElementById('main-img-${prod.id}').src='${prod.img0}'">
                            <img src="${prod.img1}" class="miniatura-ponto" onclick="document.getElementById('main-img-${prod.id}').src='${prod.img1}'">
                            <img src="${prod.img2}" class="miniatura-ponto" onclick="document.getElementById('main-img-${prod.id}').src='${prod.img2}'">
                        </div>
                        <div class="prod-nome">${prod.nome}</div>
                        <div class="prod-preco">R$ ${prod.preco.toFixed(2)}</div>
                        <button class="btn-comprar" onclick="adicionarAoCarrinho('${prod.nome}', ${prod.preco})">Selecionar</button>
                    </div>
                `;
                vitrine.insertAdjacentHTML('beforeend', produtoHTML);
            });
        }

        function adicionarAoCarrinho(nome, preco) {
            itensNoCarrinho.push({nome, preco});
            atualizarInterfaceCarrinho();
        }

        function atualizarInterfaceCarrinho() {
            const lista = document.getElementById('itens-carrinho-lista');
            lista.innerHTML = "";
            totalCompra = 0;

            if(itensNoCarrinho.length === 0) {
                lista.innerHTML = `<li style="color: var(--bege-medio); text-align: center; font-size: 13px; padding: 20px 0;">Sua sacola está vazia</li>`;
                document.getElementById('valor-total-carrinho').innerText = "R$ 0,00";
                return;
            }

            itensNoCarrinho.forEach(item => {
                totalCompra += item.preco;
                lista.innerHTML += `<li class="item-carrinho"><span>${item.nome}</span><strong>R$ ${item.preco.toFixed(2)}</strong></li>`;
            });

            document.getElementById('valor-total-carrinho').innerText = `R$ ${totalCompra.toFixed(2)}`;
        }

        function alternarCamposParcelamento() {
            const metodo = document.getElementById('metodo-pagamento').value;
            document.getElementById('wrapper-parcelas').style.display = (metodo === 'parcelado') ? 'block' : 'none';
        }

        function fecharPedidoLoja() {
            if (totalCompra <= 0) { alert("Sua sacola está vazia!"); return; }
            const metodo = document.getElementById('metodo-pagamento').value;
            const painelResultado = document.getElementById('checkout-resultado');
            painelResultado.style.display = "block";
            painelResultado.innerHTML = ""; 

            if (metodo === 'pix') {
                painelResultado.innerHTML = `
                    <h3 style="margin:0; font-size:15px; color:var(--bege-escuro);">Código QR Code Pix Gerado</h3>
                    <p style="font-size:13px; color:var(--texto-claro);">Valor final: <strong>R$ ${totalCompra.toFixed(2)}</strong></p>
                    <div id="qrcode-output"></div>
                    <button class="btn-comprar" style="background-color:#25D366; margin-top:10px;" onclick="enviarParaWhatsApp('Pix (QR Code)')">Concluir no WhatsApp 🐾</button>
                `;
                const stringPixECommerce = `00020101021126360014br.gov.bcb.pix0114${MINHA_CHAVE_PIX}5204000053039865405${totalCompra.toFixed(2)}5802BR5912AuroraPatas6009SaoPaulo62070503***6304`;
                new QRCode(document.getElementById("qrcode-output"), { text: stringPixECommerce, width: 150, height: 150, colorDark : "#5C4A3C", colorLight : "#FFFFFF" });
            } else if (metodo === 'parcelado') {
                const parcelas = parseInt(document.getElementById('qtd-parcelas').value);
                const valorDaParcela = totalCompra / parcelas;
                painelResultado.innerHTML = `
                    <h3 style="margin:0; font-size:15px; color:var(--bege-escuro);">Plano Definido</h3>
                    <p style="font-size:14px; margin: 10px 0 5px;">Contratado: <strong>${parcelas}x</strong> sem juros</p>
                    <p style="font-size:14px; margin: 0 0 15px;">Parcela: <strong>R$ ${valorDaParcela.toFixed(2)} / mês</strong></p>
                    <button class="btn-comprar" style="background-color:#25D366;" onclick="enviarParaWhatsApp('Parcelado em ${parcelas}x')">Concluir no WhatsApp 🐾</button>
                `;
            } else {
                painelResultado.innerHTML = `
                    <h3 style="margin:0; font-size:15px; color:var(--bege-escuro);">Pedido Pronto</h3>
                    <p style="font-size:13px; color:var(--texto-claro); margin-bottom:15px;">Pagamento em dinheiro na entrega.</p>
                    <button class="btn-comprar" style="background-color:#25D366;" onclick="enviarParaWhatsApp('Espécie (Dinheiro)')">Concluir no WhatsApp 🐾</button>
                `;
            }
        }

        function enviarParaWhatsApp(formaPagamento) {
            let listaItensTexto = "";
            itensNoCarrinho.forEach((item, index) => { listaItensTexto += `${index + 1}. ${item.nome} (R$ ${item.preco.toFixed(2)})\n`; });
            const mensagem = `Olá, AuroraPatas! Gostaria de concluir meu pedido:\n\n🔎 *PRODUTOS:*\n${listaItensTexto}\n💳 *FORMA DE PAGAMENTO:* ${formaPagamento}\n💵 *TOTAL:* R$ ${totalCompra.toFixed(2)}`;
            window.open(`https://api.whatsapp.com/send?phone=${MEU_WHATSAPP}&text=${encodeURIComponent(mensagem)}`, '_blank');
        }

        // Inicia carregando os itens cadastrados
        window.onload = carregarVitrine;
    </script>
</body>
</html>
